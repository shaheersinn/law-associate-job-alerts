name: Law Associate Job Alerts

on:
  # ── Run every 2 hours ──────────────────────────────────────────────────────
  schedule:
    - cron: '0 */2 * * *'
  # ── Manual trigger ─────────────────────────────────────────────────────────
  workflow_dispatch:

permissions:
  contents: write   # needed to commit results.json & model_weights.json back

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python ────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Install deps ──────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Restore caches (job history + model weights) ──────────────────
      - name: Restore job history cache
        id: cache-history
        uses: actions/cache/restore@v4
        with:
          path: job_history.json
          key: job-history-${{ runner.os }}-${{ github.run_number }}
          restore-keys: |
            job-history-${{ runner.os }}-

      - name: Restore model weights cache
        id: cache-weights
        uses: actions/cache/restore@v4
        with:
          path: model_weights.json
          key: model-weights-${{ runner.os }}-${{ github.run_number }}
          restore-keys: |
            model-weights-${{ runner.os }}-

      # ── 5. Run scraper ────────────────────────────────────────────────────
      - name: Run job alert script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          RESULTS_WANTED:     ${{ secrets.RESULTS_WANTED }}
          HISTORY_FILE:       job_history.json
          WEIGHTS_FILE:       model_weights.json
          RESULTS_FILE:       results.json
        run: python main.py

      # ── 6. Save caches (FIX: use separate save step to avoid conflict) ────
      - name: Save job history cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: job_history.json
          key: job-history-${{ runner.os }}-${{ github.run_number }}

      - name: Save model weights cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: model_weights.json
          key: model-weights-${{ runner.os }}-${{ github.run_number }}

      # ── 7. Commit results.json + model_weights.json back to repo ──────────
      #       This makes data available to the Vercel dashboard via GitHub raw
      - name: Commit updated results to repo
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.json model_weights.json || true
          git diff --cached --quiet || git commit -m "chore: update results & model weights [skip ci]"
          git push || true
