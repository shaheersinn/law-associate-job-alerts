name: Law Associate Job Alerts

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:
    inputs:
      reset_caches:
        description: 'Reset all caches (weights, history, LLM) — use after a fresh deploy'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Only restore caches when NOT doing a manual reset run
      - name: Restore job history cache
        if: ${{ inputs.reset_caches != 'true' }}
        uses: actions/cache/restore@v4
        with:
          path: job_history.json
          key: job-history-${{ runner.os }}-${{ github.run_number }}
          restore-keys: job-history-${{ runner.os }}-

      - name: Restore model weights cache
        if: ${{ inputs.reset_caches != 'true' }}
        uses: actions/cache/restore@v4
        with:
          path: model_weights.json
          key: model-weights-${{ runner.os }}-${{ github.run_number }}
          restore-keys: model-weights-${{ runner.os }}-

      - name: Restore LLM classification cache
        if: ${{ inputs.reset_caches != 'true' }}
        uses: actions/cache/restore@v4
        with:
          path: llm_cache.json
          key: llm-cache-${{ runner.os }}-${{ github.run_number }}
          restore-keys: llm-cache-${{ runner.os }}-

      - name: Run job alert script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          RESULTS_WANTED:     ${{ secrets.RESULTS_WANTED }}
          HISTORY_FILE:       job_history.json
          WEIGHTS_FILE:       model_weights.json
          RESULTS_FILE:       results.json
          LLM_CACHE_FILE:     llm_cache.json
          DASHBOARD_URL:      https://law-associate-job-alerts.vercel.app/
          GMAIL_TOKEN_JSON:   ${{ secrets.GMAIL_TOKEN_JSON }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          HISTORY_TTL_DAYS:   "21"
          MAX_JOB_AGE_DAYS:   "14"
        run: python main.py

      - name: Save job history cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: job_history.json
          key: job-history-${{ runner.os }}-${{ github.run_number }}

      - name: Save model weights cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: model_weights.json
          key: model-weights-${{ runner.os }}-${{ github.run_number }}

      - name: Save LLM classification cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: llm_cache.json
          key: llm-cache-${{ runner.os }}-${{ github.run_number }}

      - name: Commit updated results to repo
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.json model_weights.json || true
          git diff --cached --quiet || git commit -m "chore: update results & weights [skip ci]"
          git push || true
