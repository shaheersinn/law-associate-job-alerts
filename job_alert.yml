name: Law Associate Job Alerts

on:
  schedule:
    - cron: '0 */2 * * *'   # every 2 hours
  workflow_dispatch:         # allow manual trigger from Actions tab

permissions:
  contents: write            # needed to git-commit results.json + model_weights.json

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python ────────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Install dependencies ───────────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Restore caches ─────────────────────────────────────────────────────
      # BUG FIX: Use separate restore@v4 + save@v4 steps (not combined cache@v3).
      # The old actions/cache@v3 with a static key never saved updates because
      # GitHub does not overwrite an existing cache on a key collision — so
      # job_history.json was NEVER persisted, causing every run to re-alert
      # on all previously seen jobs.
      - name: Restore job history cache
        id: cache-history
        uses: actions/cache/restore@v4
        with:
          path: job_history.json
          key: job-history-${{ runner.os }}-${{ github.run_number }}
          restore-keys: |
            job-history-${{ runner.os }}-

      - name: Restore model weights cache
        id: cache-weights
        uses: actions/cache/restore@v4
        with:
          path: model_weights.json
          key: model-weights-${{ runner.os }}-${{ github.run_number }}
          restore-keys: |
            model-weights-${{ runner.os }}-

      # ── 5. Run scraper ────────────────────────────────────────────────────────
      - name: Run job alert script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          RESULTS_WANTED:     ${{ secrets.RESULTS_WANTED }}
          HISTORY_FILE:       job_history.json
          WEIGHTS_FILE:       model_weights.json
          RESULTS_FILE:       results.json
          DASHBOARD_URL:      https://law-associate-job-alerts.vercel.app/
        run: python main.py

      # ── 6. Save caches ────────────────────────────────────────────────────────
      # BUG FIX: Separate save step with run_number key guarantees a new cache
      # entry is written even when the restore key matched an older entry.
      - name: Save job history cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: job_history.json
          key: job-history-${{ runner.os }}-${{ github.run_number }}

      - name: Save model weights cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: model_weights.json
          key: model-weights-${{ runner.os }}-${{ github.run_number }}

      # ── 7. Commit results + weights back to repo ──────────────────────────────
      # This feeds the Vercel dashboard with fresh data on every run.
      # [skip ci] prevents this commit from triggering another workflow run.
      - name: Commit updated results to repo
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.json model_weights.json || true
          git diff --cached --quiet || git commit -m "chore: update results & weights [skip ci]"
          git push || true
