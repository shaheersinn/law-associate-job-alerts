name: Weekly Law Associate Job Alerts

on:
  # Run every Monday at 14:00 UTC (09:00 Eastern Time)
  schedule:
    - cron: '0 14 * * 1'
  # Allow manual dispatch
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Restore cached job history so we don't re-alert the same listings
      - name: Restore job history cache
        uses: actions/cache@v3
        with:
          path: job_history.json
          key: job-history-${{ runner.os }}
          restore-keys: |
            job-history-

      - name: Run job alert script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          RESULTS_WANTED:     ${{ secrets.RESULTS_WANTED }}
          HISTORY_FILE:       job_history.json
        run: |
          python main.py

      # Save updated history for next run
      - name: Save job history cache
        if: always()
        uses: actions/cache@v3
        with:
          path: job_history.json
          key: job-history-${{ runner.os }}
